<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>
<style>
  body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:#0a0a0a;color:#fff;
    display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
  .card{background:#161616;border:1px solid #2a2a2a;border-radius:10px;padding:34px;width:320px}
  h2{margin:0 0 20px}
  input{width:100%;box-sizing:border-box;padding:11px;margin-bottom:12px;border-radius:6px;
    border:1px solid #333;background:#0d0d0d;color:#fff;font-size:15px}
  button{width:100%;padding:12px;border:0;border-radius:6px;background:#2196F3;color:#fff;
    font-weight:bold;font-size:15px;cursor:pointer}
  .msg{margin-top:12px;font-size:13px;min-height:18px;color:#e57373;white-space:pre-wrap}
  .ok{color:#81c784}
  a{color:#64b5f6;font-size:13px;cursor:pointer;display:block;text-align:center;margin-top:16px}
  #reg{display:none}
</style></head><body>
<div class="card">
  <div id="log">
    <h2>Sign In</h2>
    <input id="lu" placeholder="Username" autocomplete="username">
    <input id="lp" type="password" placeholder="Password" autocomplete="current-password">
    <button onclick="login()">Sign In</button>
    <a onclick="swap()">New here? Register as a broadcaster →</a>
  </div>
  <div id="reg">
    <h2>Register</h2>
    <input id="ru" placeholder="Username">
    <input id="rp" type="password" placeholder="Password (min 6)">
    <input id="rc" placeholder="WhatsApp / phone (for activation)">
    <button onclick="signup()">Register</button>
    <a onclick="swap()">← Back to sign in</a>
  </div>
  <div class="msg" id="msg"></div>
</div>
<script>
const $=id=>document.getElementById(id);
function swap(){ $('log').style.display=$('log').style.display==='none'?'block':'none';
  $('reg').style.display=$('reg').style.display==='block'?'none':'block'; $('msg').innerText=''; }
async function login(){
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:$('lu').value,password:$('lp').value})});
  const d=await r.json();
  if(d.error){$('msg').className='msg';$('msg').innerText=d.error;return;}
  location.href = d.role==='admin'?'/admin.html' : d.role==='subscriber'?'/sub.html' : '/watch.html';
}
async function signup(){
  const r=await fetch('/api/signup',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:$('ru').value,password:$('rp').value,contact:$('rc').value})});
  const d=await r.json();
  $('msg').className = d.ok?'msg ok':'msg';
  $('msg').innerText = d.message||d.error;
}
$('lp').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
</script></body></html>
